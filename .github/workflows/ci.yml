name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

# Hủy job cũ nếu push mới hơn
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ══════════════════════════════════════════════
  #  BACKEND — Node.js + TypeScript
  # ══════════════════════════════════════════════
  backend:
    name: Backend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: learnex_test
          POSTGRES_USER: learnex_user
          POSTGRES_PASSWORD: learnex_pass
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint --if-present

      - name: Run tests
        run: npm test --if-present
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://learnex_user:learnex_pass@localhost:5432/learnex_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test_secret_key_for_ci_only_not_real
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}

      - name: Build TypeScript
        run: npm run build

  # ══════════════════════════════════════════════
  #  WEB — React + TypeScript + Vite
  # ══════════════════════════════════════════════
  web:
    name: Web CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./web

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint --if-present

      - name: Build (kiểm tra không bị lỗi build)
        run: npm run build
        env:
          VITE_API_BASE_URL: https://placeholder.railway.app/api/v1
          VITE_WS_URL: wss://placeholder.railway.app/ws

  # ══════════════════════════════════════════════
  #  FLUTTER — Mobile
  # ══════════════════════════════════════════════
  flutter:
    name: Flutter CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./mobile

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter Beta
        uses: subosito/flutter-action@v2
        with:
          channel: 'beta'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze (lint Dart)
        run: flutter analyze --fatal-infos

      - name: Run tests
        run: flutter test

      - name: Build APK debug (kiểm tra compile được)
        run: flutter build apk --debug --no-pub